<div class="flex flex-col justify-center gap-5">
  <div>
    <p class="text-sm text-gray-500 mb-1">Admin Dashboard</p>
    <h1 class="text-2xl font-bold mb-4">Category Admin Page</h1>
  </div>
  <div>
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-full border p-4">
      <legend class="fieldset-legend">Settings</legend>
      <div class="flex flex-row justify-between gap-5">
        <div class="join">
          <input type="text" class="input join-item" placeholder="Product name" (keyup)="obtenerCategorias(txtvalue.value)"  #txtvalue/>
          <button class="btn join-item btn-primary" (click)="obtenerCategorias(txtvalue.value)">buscar</button>
        </div>
        <div class="flex items-center gap-4">
          <label class="cursor-pointer label">
            <span class="label-text">Activos</span>
            <input type="checkbox" class="checkbox ml-2" [checked]="activeChecked()" (change)="setActiveChecked($event.target.checked)" />
          </label>
          <label class="cursor-pointer label">
            <span class="label-text">Inactivos</span>
            <input type="checkbox" class="checkbox ml-2" [checked]="inactiveChecked()" (change)="setInactiveChecked($event.target.checked)" />
          </label>
        </div>
        <div>
          <button class="btn btn-primary" (click)="openModal()">Agregar</button>
        </div>
      </div>
    </fieldset>
  </div>
  <div class="overflow-x-auto rounded-lg border border-base-300">
    <table class="table table-sm table-zebra w-full bg-base-100">
      <!-- head -->
      <thead class="bg-base-200 text-base-content">
        <tr>
          <th class="w-12"></th>
          <th>Name</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <!-- row 1 -->
        @for (item of ListaCategorias(); track item.id) {
          <tr>
            <th>{{ $index + 1 }}</th>
            <td>{{ item.name }}</td>
            <td>
              <div class="flex gap-2">
                <button class="btn btn-sm btn-outline btn-info" (click)="openModalForEdit(item)">
                  Editar
                </button>
                @if (item.isActive) {
                  <button class="btn btn-sm btn-outline btn-error" (click)="deactivateCategory(item)">
                    Desactivar
                  </button>
                } @else {
                  <button class="btn btn-sm btn-outline btn-success" (click)="activateCategory(item)">
                    Activar
                  </button>
                }
              </div>
            </td>
          </tr>
          <!-- row 2 -->
        }
      </tbody>
    </table>
  </div>

  <app-generic-modal
    [createTitle]="'Crear Nueva Categoría'"
    [createDescription]="'Agrega una nueva categoría a tu tienda'"
    [editTitle]="'Editar Categoría'"
    [editDescription]="'Modifica los datos de la categoría'"
    [fieldLabel]="'Nombre de la Categoría'"
    [fieldPlaceholder]="'Ingresa el nombre...'"
    (itemSaved)="onCategorySaved($event)"
  ></app-generic-modal>
  <app-confirm-modal></app-confirm-modal>
  <app-alert></app-alert>
</div>
