@if (confirmService.confirmOptions(); as options) {
  <dialog id="confirm-modal" class="modal modal-open">
    <div class="modal-box max-w-sm">
      <h3 class="text-lg font-bold mb-4">{{ options.title }}</h3>
      <p class="text-base py-4">{{ options.message }}</p>
      <div class="modal-action justify-end gap-3">
        <button class="btn btn-outline" (click)="cancel()">
          {{ options.cancelText || 'Cancelar' }}
        </button>
        <button class="btn btn-primary" (click)="accept()">
          {{ options.acceptText || 'Aceptar' }}
        </button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop">
      <button (click)="cancel()">cerrar</button>
    </form>
  </dialog>
}
