<ul class="menu w-full grow">
  <!-- List item Categories -->
  <li>
    <a routerLink="/admin/category" routerLinkActive="active" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Categories">
      <!-- Categories icon -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="2"
        fill="none"
        stroke="currentColor"
        class="my-1.5 inline-block size-4"
      >
        <path d="M12 2h-7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7"></path>
        <path d="M12 2v18"></path>
        <path d="M2 8h18"></path>
        <path d="M6 8v12"></path>
        <path d="M18 8v12"></path>
      </svg>
      <span class="is-drawer-close:hidden">Categories</span>
    </a>
  </li>

  <!-- List item Colors -->
  <li>
    <a routerLink="/admin/color" routerLinkActive="active" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Colors">
      <!-- Colors icon -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="2"
        fill="none"
        stroke="currentColor"
        class="my-1.5 inline-block size-4"
      >
        <circle cx="12" cy="12" r="10"></circle>
        <circle cx="12" cy="12" r="6" fill="currentColor" opacity="0.3"></circle>
      </svg>
      <span class="is-drawer-close:hidden">Colors</span>
    </a>
  </li>
    <!-- List item Sizes -->
  <li>
    <a routerLink="/admin/size" routerLinkActive="active" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Sizes">
      <!-- Sizes icon -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="2"
        fill="none"
        stroke="currentColor"
        class="my-1.5 inline-block size-4"
      >
        <circle cx="12" cy="12" r="10"></circle>
        <circle cx="12" cy="12" r="6" fill="currentColor" opacity="0.3"></circle>
      </svg>
      <span class="is-drawer-close:hidden">Sizes</span>
    </a>
  </li>

  <!-- List item Products -->
  <li>
    <a routerLink="/admin/product" routerLinkActive="active" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Products">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="2"
        fill="none"
        stroke="currentColor"
        class="my-1.5 inline-block size-4"

        <path d="M4 6h16v12H4z"></path>
        <path d="M4 10h16"></path>
      </svg>

    </a>

  <!-- List item Stores -->

    <a routerLink="/admin/stores" routerLinkActive="active" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Stores">

        xmlns="http://www.w3.org/2000/svg"

        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="2"
        fill="none"
        stroke="currentColor"
        class="my-1.5 inline-block size-4"
      >
        <path d="M3 9l9-6 9 6v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"></path>
        <path d="M9 22V12h6v10"></path>
      </svg>
      <span class="is-drawer-close:hidden">Stores</span>

    <a routerLink="/admin/inventory" routerLinkActive="active" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Inventory">

        <path d="M16 4v16"></path>
      </svg>

  <!-- List item Users (Admin only) -->
  @if (authService.isAdmin()) {
    <li>
      <a routerLink="/admin/users" routerLinkActive="active" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Users">

          viewBox="0 0 24 24"
          stroke-linejoin="round"
          stroke-linecap="round"
          stroke-width="2"
          fill="none"
          stroke="currentColor"
          class="my-1.5 inline-block size-4"
        >
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M22 2l-1 1"></path>
          <path d="M22 8l-1-1"></path>
          <path d="M16 2l1 1"></path>
          <path d="M16 8l1-1"></path>
        </svg>
        <span class="is-drawer-close:hidden">Users</span>
